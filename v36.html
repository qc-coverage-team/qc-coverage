.page{max-width:1100px;margin:0 auto;padding:2rem 1.5rem}
h1{font-size:20px;font-weight:600}
.dateline{font-size:13px;color:#888;margin-top:3px}

.btn{border:none;border-radius:8px;padding:8px 16px;font-size:13px;font-weight:500;cursor:pointer}
.btn-dark{background:#1a1a1a;color:#fff}
.btn-dark:hover{background:#333}
.btn-gray{background:#555;color:#fff}
.btn-gray:hover{background:#333}
.lastupdated{font-size:11px;color:#bbb}
.stats{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:1.25rem}
.stat{background:#fff;border:0.5px solid #e0e0e0;border-radius:10px;padding:10px 18px;min-width:90px;text-align:center}
.stat-n{font-size:26px;font-weight:600}
.stat-n.green{color:#3b7a1a}
.stat-n.red{color:#c0392b}
.legend{display:flex;gap:14px;flex-wrap:wrap;margin-bottom:1.25rem}
.li{display:flex;align-items:center;gap:5px;font-size:12px;color:#555}
.lb{width:14px;height:14px;border-radius:3px;flex-shrink:0}
.card{background:#fff;border:0.5px solid #e0e0e0;border-radius:12px;padding:1.25rem 1.25rem 1rem;margin-bottom:1rem}
.team-name{font-size:12px;font-weight:600;color:#888;letter-spacing:.05em;text-transform:uppercase;margin-bottom:.75rem}
.axis{display:flex;position:relative;margin-left:150px;margin-bottom:4px;height:16px}
.axis-tick{position:absolute;font-size:10px;color:#bbb;transform:translateX(-50%)}
.person-row{display:flex;align-items:center;margin-bottom:4px;min-height:30px}
.pinfo{width:150px;flex-shrink:0;padding-right:12px}
.pname{font-size:12px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ptz{font-size:10px;color:#aaa}
.timeline{flex:1;position:relative;height:28px}
.track{position:absolute;top:50%;transform:translateY(-50%);left:0;right:0;height:3px;background:#f0f0f0;border-radius:2px}
.bar{position:absolute;top:50%;transform:translateY(-50%);height:22px;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:500;white-space:nowrap;overflow:hidden;padding:0 6px;cursor:default}
.bar:hover{filter:brightness(.93)}
.b-in{background:#d4edba;color:#2d6010}
.b-off{background:#efefef;color:#888;border:.5px solid #ddd}
.b-pto{background:#fadadd;color:#8b2035}
.b-sick{background:#fde8d8;color:#7a3010}
.b-hol{background:#fdd5d5;color:#8b1a1a}
.b-comp-hol{background:#f5c6cb;color:#721c24}
.b-special{background:#d6e8fa;color:#1a4a7a}
.now-wrap{position:absolute;top:0;bottom:0;pointer-events:none;z-index:20}
.now-line{width:1.5px;height:100%;background:#e74c3c}
.now-tip{position:absolute;top:-18px;left:50%;transform:translateX(-50%);font-size:10px;color:#e74c3c;font-weight:600;white-space:nowrap;background:#fff;padding:1px 4px;border-radius:3px}
.cov-card{background:#fff;border:.5px solid #e0e0e0;border-radius:12px;padding:1.25rem;margin-bottom:1rem}
.cov-title{font-size:12px;font-weight:600;color:#888;letter-spacing:.05em;text-transform:uppercase;margin-bottom:.75rem}
.cov-row{display:flex;align-items:center;margin-bottom:6px}
.cov-label{width:150px;flex-shrink:0;font-size:11px;color:#666;padding-right:12px}
.cov-bar-wrap{flex:1;display:flex;height:18px;border-radius:4px;overflow:hidden}
.cov-seg{height:100%;cursor:default}
.cov-seg:hover{filter:brightness(.88)}
.error{background:#fff3f3;border:1px solid #fcc;border-radius:10px;padding:1rem 1.25rem;color:#c00;font-size:13px;margin-bottom:1rem}
.stale{background:#fffbea;border:.5px solid #f0d060;border-radius:8px;padding:6px 14px;font-size:12px;color:#7a6000;margin-bottom:1rem}
.sticky-bar{position:fixed;top:0;left:0;right:0;z-index:100;background:rgba(245,245,243,0.97);backdrop-filter:blur(6px);padding:8px 1.5rem 22px;border-bottom:0.5px solid #e0e0e0}
.sticky-inner{max-width:1100px;margin:0 auto}
.page{padding-top:4rem}
.cov-hour{position:absolute;top:50%;transform:translateY(-50%) translateX(-50%);font-size:9px;color:rgba(0,0,0,0.45);pointer-events:none;white-space:nowrap}

@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}

  const teamFilter = document.getElementById('team-filter');

    return;

  // Update sub-team dropdown
  const subteams = CALENDAR_SUBTEAMS[calKey] || [];
  teamFilter.innerHTML = '<option value="ALL">All</option>';
  subteams.forEach(s => {
    const opt = document.createElement('option');

    opt.textContent = s.label;
    teamFilter.appendChild(opt);
  });
  teamFilter.style.display = subteams.length > 0 ? '' : 'none';

  Object.assign(TEAM_LABELS, cal.teamLabels);
  // Also update TEAM_TZ for this calendar's teams
  if(cal.teamLabels) {
    Object.keys(cal.teamLabels).forEach(t => {
      if(!TEAM_TZ[t] && TEAM_TZ[t] !== '') {
        // Set default TZ based on label
        const lbl = cal.teamLabels[t]||'';

        else if(lbl.includes('EET')) TEAM_TZ[t]='EET';
        else TEAM_TZ[t]='ET';
      }
    });
  }
}

  const min  = Math.round((h - Math.floor(h)) * 60);
  const ampm = hour >= 12 ? 'PM' : 'AM';
  const h12  = hour % 12 === 0 ? 12 : hour % 12;
  return h12 + (min > 0 ? ':' + String(min).padStart(2,'0') : '') + ' ' + ampm;
}

function isDST(d) {
  const jan = new Date(d.getFullYear(), 0, 1).getTimezoneOffset();
  const jul = new Date(d.getFullYear(), 6, 1).getTimezoneOffset();
  return d.getTimezoneOffset() < Math.max(jan, jul);
}

}

function shiftStatus(shift){
  if(!shift) return 'off';
  const s = shift.toLowerCase();
  if(s.includes('pto') || s.includes('vacation') || s.includes('personal')) return 'pto';
  if(s.includes('sick') || s.includes('medical') || s.includes('leave'))   return 'sick';
  if(s.includes('off') || s.includes('ooo'))     return 'off';
  if(s==='in')              return 'in';

  // Check named company/national holidays first
  if(COMPANY_HOLIDAY_NAMES.some(h => s.includes(h))) return 'comp_hol';

function teamForName(name, teamFromAirtable){
  // For RIV calendar, always use location-based team mapping (ignore Airtable team field)
  if(_activeCalendar === 'INGEST') {
    const ingestTeams = CALENDARS.INGEST.memberTeams;
    if(ingestTeams[name]) return ingestTeams[name];
    const nameLower = name.toLowerCase();
    const match = Object.keys(ingestTeams).find(k =>
      k.split(' ').some(p => p.length > 3 && nameLower.includes(p.toLowerCase()))
    );
    return match ? ingestTeams[match] : 'Ingest NY';
  }
   if(_activeCalendar === 'RIV') {
     const rivTeams = CALENDARS.RIV.memberTeams;
     if(rivTeams[name]) return rivTeams[name];
     // Normalize name - strip apostrophes and special chars for matching
     const nameNorm = name.toLowerCase().replace(/[^a-z ]/g, '');
     const match = Object.keys(rivTeams).find(k => {
       const kNorm = k.toLowerCase().replace(/[^a-z ]/g, '');
       if(kNorm === nameNorm) return true;
       const parts = kNorm.split(' ');
       return parts.some(p => p.length > 3 && nameNorm.includes(p));
     });
     if(match) return rivTeams[match];
     return 'RIV US';
   }
  if(teamFromAirtable) return teamFromAirtable;
  const lower = name.toLowerCase();
  if(RIV_VP.some(n => lower.includes(n.split(' ')[1]||n))) return 'VP';
  for(const [team, members] of Object.entries(TEAM_MEMBERS)){
    if(members.some(m => lower.includes(m))) return team;
  }
  return 'Other';
}

function lsLoad(ds){
  try{
    const raw = localStorage.getItem(lsKey(ds));
    if(!raw) return null;
    const obj = JSON.parse(raw);
    if(Date.now() - obj.ts < 2*60*60*1000){
      // Reset any propagated holiday overrides from previous sessions
      // Holidays are re-detected and re-applied on each load
      const records = obj.records.map(r => {
        if(!r || !r.fields) return r;
        if(r.fields['Shift'] === 'US Holiday') {
          // Restore original Off status for placeholder records
          if(r.id && r.id.startsWith('placeholder_')) {
            return {...r, fields: {...r.fields, 'Shift': 'Off'}};
          }
        }
        return r;
      });
      return records;
    }
    return null;
  }catch(e){ return null; }

function resolveEmployees(rawEmployees) {
  if(!Array.isArray(rawEmployees)) rawEmployees = rawEmployees ? [rawEmployees] : [];
  return rawEmployees.map(e => {
    // Object with name property (expanded linked record)
    if(e && typeof e === 'object' && e.name) return e.name.trim();
    // Plain string name
    if(typeof e === 'string' && !e.startsWith('rec')) return e.trim();
    // Record ID - try employee map
    if(typeof e === 'string' && e.startsWith('rec') && _employeeMap && _employeeMap[e]) {
      return _employeeMap[e].name;
    }
    // Last resort - return as-is so we can debug
    return typeof e === 'string' ? e : null;
  }).filter(Boolean);
}

// Parse time string like "9am-5pm EST" or "8:30am-4:30pm EST"
function parseCoordTime(str) {
  if(!str || str.toLowerCase() === 'off' || str.toLowerCase() === 'n/a') return null;
  // Extract first time range (before parenthesis)
  const main = str.split('(')[0].trim();
  const m = main.match(/(\d{1,2}(?::\d{2})?)\s*(am|pm)\s*[-–]\s*(\d{1,2}(?::\d{2})?)\s*(am|pm)/i);
  if(!m) return null;
  const parseT = (num, period) => {
    const parts = num.split(':');
    let h = parseInt(parts[0]);
    const min = parts[1] ? parseInt(parts[1]) : 0;
    if(period.toLowerCase() === 'pm' && h !== 12) h += 12;
    if(period.toLowerCase() === 'am' && h === 12) h = 0;
    return h + min/60;
  };
  return { start: parseT(m[1], m[2]), end: parseT(m[3], m[4]) };
}

async function fetchIngestDay(ds) {
  const cal = CALENDARS.INGEST;
  let records = [], offset = null;
  do {
    let url = `https://api.airtable.com/v0/${cal.baseId}/${cal.tableId}?filterByFormula=IS_SAME({Date},"${ds}","day")&pageSize=100`;
    if(offset) url += '&offset='+offset;
    const r = await fetch(url, {headers:{Authorization:'Bearer '+cal.token}});
    if(!r.ok) throw new Error('Ingest fetch '+r.status);
    const d = await r.json();
    records = records.concat(d.records||[]);
    offset = d.offset||null;
  } while(offset);

  // Filter to only allowed people
  const allowed = CALENDARS.INGEST.allowedNames;
  records = records.filter(rec => {
    const name = (rec.fields['Name']||'').toLowerCase();
    return allowed.some(n => name.includes(n));
  });

  // Convert to standard format
  return records.map(rec => {
    const f = rec.fields;
    const name = f['Name']||'';
    const assignment = (f['Assignment']||'Working').toLowerCase();
    const memberInfo = cal.memberTeams[name] || 'Ingest NY';
    const team = typeof memberInfo === 'string' ? memberInfo : 'Ingest NY';

    // Use Shift Times field (local time) as primary source, fall back to Shift Start UTC
    const shiftTimesField = f['Shift Times']||'';
    const shiftStart = f['Shift Start']||'';
    const shiftEnd = f['Shift End']||'';
    let startUTC = null, duration = 0;

    // Shift Times field is always in ET local time (e.g. "03:00 - 11:00")
    // Convert ET local -> UTC, then display timezone handles the rest
    const ET_OFFSET = -4; // EDT (summer)

    if(shiftTimesField && assignment === 'working'){
      const parts = shiftTimesField.split('-').map(s=>s.trim());
      if(parts.length === 2){
        const parseT = t => { const m=t.match(/(\d{1,2}):(\d{2})/); return m?parseInt(m[1])+parseInt(m[2])/60:null; };
        const localStart = parseT(parts[0]);
        const localEnd = parseT(parts[1]);
        if(localStart !== null){
          startUTC = ((localStart - ET_OFFSET) + 24) % 24; // ET -> UTC
          duration = localEnd !== null ? (localEnd >= localStart ? localEnd - localStart : 24 - localStart + localEnd) : 8;
        }
      }
    } else if(shiftStart && assignment === 'working'){
      const s = new Date(shiftStart);
      const e = new Date(shiftEnd||shiftStart);
      startUTC = s.getUTCHours() + s.getUTCMinutes()/60;
      duration = shiftEnd ? (e - s) / 3600000 : 8;
    }

    let shift = 'IN';
    if(assignment === 'off') shift = 'Off';
    else if(assignment === 'holiday') shift = 'Holiday';
    else if(assignment.includes('pto') || assignment.includes('vacation')) shift = 'PTO';
    else if(assignment.includes('sick')) shift = 'Sick Leave';

    return {
      id: rec.id,
      fields: {
        'Employees': name,
        'Name (from Employees)': [name],
        'Team (from Employees)': [team],
        'Shift': shift,
        'Start Date': shiftStart || `${ds}T13:00:00.000Z`,
        'Shift duration': duration,
        'Comment': f['Shift Times']||''
      }
    };
  });
}

async function fetchCoordDay(ds) {
  const cal = CALENDARS.COORD;
  const dayNames = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const date = new Date(ds + 'T12:00:00');
  const dayName = dayNames[date.getDay()];

  // Fetch weekly schedule (static, not date-filtered)
  const r = await fetch(`https://api.airtable.com/v0/${cal.baseId}/${cal.tableId}?pageSize=100`,
    {headers:{Authorization:'Bearer '+cal.token}});
  if(!r.ok) throw new Error('Coord fetch '+r.status);
  const data = await r.json();

  // Fetch PTO for this date - paginate to get all records
  const ptoDates = {};
  const PTO_NICKNAMES2 = {'nicco':'niccolò','nico':'niccolò','halley':'halley','sam':'samantha','tessa':'tessa','tess':'tessa'};
  // Types that indicate absence (not just schedule changes)
  const ABSENCE_TYPES = ['sick','vacation','medical','leave','pto','ooo','holiday','summer','summer day','personal'];
  try {
    let ptoOffset = null;
    do {
      let ptoUrl = `https://api.airtable.com/v0/${cal.baseId}/${cal.ptoTableId}?pageSize=100`;
      if(ptoOffset) ptoUrl += '&offset='+ptoOffset;
      const pr = await fetch(ptoUrl, {headers:{Authorization:'Bearer '+cal.token}});
      if(!pr.ok) break;
      const pd = await pr.json();
      (pd.records||[]).forEach(rec => {
        const f = rec.fields;
        const ptoType = (f['PTO Type']||'').toLowerCase();
        // Include all absence types - be inclusive rather than exclusive
        const raw = (f['Person on PTO']||'').toLowerCase().trim();
        if(!raw) return;
        const ptoFirst = PTO_NICKNAMES2[raw] || raw;
        const start = f['Start Date']||'';
        const end = f['End Date']||start;
        if(start){
          if(!ptoDates[ptoFirst]) ptoDates[ptoFirst]=[];
          ptoDates[ptoFirst].push({start, end: end||start, type: f['PTO Type']||'PTO'});
        }
      });
      ptoOffset = pd.offset||null;
    } while(ptoOffset);
  } catch(e){ console.warn('PTO fetch error:', e); }

  // Build synthetic records matching QC format
  const synthRecords = [];
  (data.records||[]).forEach(rec => {
    const f = rec.fields;
    const name = f['Name']||'';
    if(!name) return;
    const memberInfo = cal.members[name] || { team: 'Coordination Team', homeOffset: -5 };
    const dayVal = f[dayName]||'Off';
    const isOff = !dayVal || dayVal.toLowerCase() === 'off';
    const nameLower = name.toLowerCase();
    const firstName = nameLower.split(' ')[0];
    // Match by full name, first name, or nickname
    const matchedPTO = Object.keys(ptoDates).find(pn =>
      nameLower.includes(pn) || pn.includes(firstName) || firstName.includes(pn) || firstName === pn
    );
    const ptoRecord = matchedPTO ? ptoDates[matchedPTO].find(p => p.start <= ds && ds <= p.end) : null;
    const isPTO = !!ptoRecord;
    const ptoType = ptoRecord ? ptoRecord.type : '';
    const times = isOff ? null : parseCoordTime(dayVal);

    // Convert local start to UTC
    let startUTC = null, duration = 0;
    if(times && !isOff){
      startUTC = ((times.start - memberInfo.homeOffset) + 24) % 24;
      duration = times.end > times.start ? times.end - times.start : (24 - times.start + times.end);
    }

    synthRecords.push({
      id: 'coord_'+name,
      fields: {
        'Employees': name,
        'Name (from Employees)': [name],
        'Team (from Employees)': [memberInfo.team],
        'Shift': isPTO ? (ptoType||'PTO') : (isOff ? 'Off' : 'IN'),
        'Start Date': startUTC !== null ? new Date(Date.UTC(
          date.getFullYear(), date.getMonth(), date.getDate(),
          Math.floor(startUTC), Math.round((startUTC % 1)*60)
        )).toISOString() : null,
        'Shift duration': duration,
        'Comment': times ? `${times.start}:00 - ${times.end}:00` : ''
      }
    });
  });
  return synthRecords;
}

async function fetchDay(ds, force){
  const cacheKey = _activeCalendar+'_'+ds;
  if(_cache[cacheKey] && !force) return;
  // Coordination team has completely different structure - handle separately
  if(_activeCalendar === 'COORD') {
    _cache[ds] = await fetchCoordDay(ds);
    lsSave(ds, _cache[ds]);
    return;
  }
  // Ingest team uses Date field and Name directly
  if(_activeCalendar === 'INGEST') {
    _cache[ds] = await fetchIngestDay(ds);
    lsSave(ds, _cache[ds]);
    return;
  }
  const tid = await getTableId();
  const cal = CALENDARS[_activeCalendar];
  const activeBase = cal ? cal.baseId : BASE;
  const activeToken = cal ? cal.token : TOKEN;
  let records=[], offset=null;
  do {
    let url = `https://api.airtable.com/v0/${activeBase}/${tid}?filterByFormula=IS_SAME({Start Date},"${ds}","day")&pageSize=100`;
    if(offset) url += '&offset='+offset;
    const r = await fetch(url, {headers:{Authorization:'Bearer '+activeToken}});
    if(!r.ok) throw new Error('Airtable '+r.status+': '+await r.text());
    const d = await r.json();
    records = records.concat(d.records||[]);
    offset = d.offset||null;
  } while(offset);

  // Also fetch RIV people from RIV table (only when in QC mode)
  if(_activeCalendar !== 'QC') {
    // For RIV: add placeholder OFF records for known members with no record today
    if(_activeCalendar === 'RIV') {
      const cal = CALENDARS.RIV;
      const seenNames = new Set(records.map(r => {
        const nfe = r.fields['Name (from Employees)'];
        return ((Array.isArray(nfe) ? nfe[0] : nfe) || r.fields['Employees'] || '').toLowerCase().replace(/[^a-z ]/g,'');
      }).filter(Boolean));
      Object.keys(cal.memberTeams).forEach(memberName => {
        const mNorm = memberName.toLowerCase().replace(/[^a-z ]/g,'');
        if(!seenNames.has(mNorm)) {
          records.push({
            id: 'placeholder_'+memberName,
            fields: {
              'Employees': memberName,
              'Name (from Employees)': [memberName],
              'Team (from Employees)': [cal.memberTeams[memberName]],
              'Shift': 'Off',
              'Start Date': null,
              'Shift duration': 0
            }
          });
        }
      });
      // Remove bank holiday entries that snuck in as names
      records = records.filter(r => {
        const n = (r.fields['Employees']||'').toLowerCase();
        return !n.includes('bank holiday') && !n.includes('offices closed') && !n.includes('holiday us') && !n.includes('holiday ca') && !n.includes('holiday nl');
      });
    }
    _cache[ds] = records;
    lsSave(ds, records);
    // Apply any previously detected holidays to this calendar's records
    applyGlobalHolidaysToAllCaches(ds);
    return;
  }
  // QC mode: also fetch RIV people from RIV table
  const date = new Date(ds+'T12:00:00');
  const dayOfWeek = date.getDay(); // 0=Sun, 6=Sat
  const isWeekend = dayOfWeek === 0 || dayOfWeek === 6;
  console.log('Date:', ds, 'Day:', dayOfWeek, 'isWeekend:', isWeekend);
  try {
    let rivOffset = null;
    do {
      let rivUrl = `https://api.airtable.com/v0/${BASE}/tblnDTIxNAC0usEWF?filterByFormula=IS_SAME({Start Date},"${ds}","day")&pageSize=100`;
      if(rivOffset) rivUrl += '&offset='+rivOffset;
      const rr = await fetch(rivUrl, {headers:{Authorization:'Bearer '+TOKEN}});
      if(!rr.ok) break;
      const rd = await rr.json();
      (rd.records||[]).forEach(rec => {
        const name = (rec.fields['Employees']||'').toLowerCase();
        if(name.includes('bank holiday')||name.includes('offices closed')||name.includes('holiday')) return;
        const isVP = RIV_VP.some(n => name.includes(n.toLowerCase()));
        // T'Khari matching - handle apostrophe variants
        const isKhari = name.includes('khari');
        const isWeekendHelper = isKhari || RIV_WEEKEND.some(n => n.toLowerCase().split(' ').some(part => part.length > 3 && name.includes(part)));
        if(isVP || (isWeekendHelper && isWeekend)){
          // Tag team field so render knows where to put them
          rec.fields['Team (from Employees)'] = isVP ? 'VP' : '*QC NY';
          records.push(rec);
        }
      });
      rivOffset = rd.offset||null;
    } while(rivOffset);
  } catch(e){ /* RIV fetch optional */ }

  _cache[cacheKey] = records;
  _cache[ds] = records; // also set plain key for compatibility
  lsSave(ds, records);
}

// Check if a date is a holiday for a given person
function getPersonHoliday(personName, ds) {
  const nameLower = personName.toLowerCase().replace(/[^a-z ]/g,'');
  const region = Object.keys(PERSON_HOLIDAY_REGION).find(k => nameLower.includes(k));
  if(!region) return null;
  const regionCode = PERSON_HOLIDAY_REGION[region];
  const dates = PARAMOUNT_HOLIDAYS_2026[regionCode] || [];
  return dates.includes(ds) ? regionCode : null;
}


function propagateHolidays(records, ds) {
  if(!records || !records.length) return;
  // Only process 2026 dates (hardcoded calendar)
  if(!ds || !ds.startsWith('2026')) return;

  function getRecName(f) {
    const nfe = Array.isArray(f['Name (from Employees)']) ? f['Name (from Employees)'][0] : (f['Name (from Employees)']||'');
    const emp = f['Employees'];
    const empStr = Array.isArray(emp) ? (emp[0]||'') : (typeof emp === 'string' ? emp : '');
    return (nfe || f['Name'] || empStr || '').toLowerCase().replace(/[^a-z ]/g,'');
  }

  records.forEach(rec => {
    if(!rec || !rec.fields) return;
    const f = rec.fields;
    const name = getRecName(f);
    if(!name) return;
    const currentShift = (f['Shift'] || f['Assignment'] || '').toLowerCase().trim();
    // Only apply to working or off people
    if(!['in','working','normal shift','off'].includes(currentShift)) return;

    const holiday = getPersonHoliday(name, ds);
    if(holiday) f['Shift'] = 'US Holiday'; // comp_hol status
  });
}


// Apply stored global holidays to all calendar caches for a given date
function applyGlobalHolidaysToAllCaches(ds) {
  const activeHolidays = _globalHolidays[ds];
  if(!activeHolidays || !activeHolidays.size) return;

  // Apply to all available record sets
  const allCacheSets = [
    _cache[ds], _cache['QC_'+ds], _cache['RIV_'+ds],
    _cache['INGEST_'+ds], _cache['COORD_'+ds],
    (_allCalendarCache[ds]||{}).QC, (_allCalendarCache[ds]||{}).RIV,
    (_allCalendarCache[ds]||{}).INGEST, (_allCalendarCache[ds]||{}).COORD
  ];
  allCacheSets.forEach(recs => { if(recs && recs.length) propagateHolidays(recs, ds); });
}


// ── Render ────────────────────────────────────────────────────────────────────
function render(records, ds){
  const tz  = activeTz();
  const now = nowInTz(tz);
  const isToday = ds === dateStr(new Date());

  const AXIS_HOURS  = [0,3,6,9,12,15,18,21,24];
  const AXIS_LABELS = ['12 AM','3 AM','6 AM','9 AM','12 PM','3 PM','6 PM','9 PM','12 AM'];

  // Build people map: name -> shiftData
  const peopleMap = {};
  records.forEach(rec => {
    const f = rec.fields;
    // Use 'Name (from Employees)' if available (already resolved by Airtable)
    // Fall back to resolving 'Employees' field manually
    const nameFromEmployees = f['Name (from Employees)'];
    const employees = nameFromEmployees
      ? (Array.isArray(nameFromEmployees) ? nameFromEmployees : [nameFromEmployees]).map(n=>String(n).trim()).filter(Boolean)
      : resolveEmployees(f['Employees']);
    const teamField  = Array.isArray(f['Team (from Employees)']) ? f['Team (from Employees)'][0] : (f['Team (from Employees)']||'');
    const shift    = f['Shift']||'';
    const comment  = f['Comment']||f['Comments']||f['comment']||'';
    const duration = parseFloat(f['Shift duration'])||0;
    const sd       = f['Start Date']||'';

    let startET=null, endET=null, localStart=null, localEnd=null;

    // Determine home TZ offset from team field
    const tf2 = String((Array.isArray(teamField) ? teamField[0] : teamField) || '');
    const isIndiaTeam = tf2.includes('QC IN');
    const isCoordTeam = _activeCalendar === 'COORD';
    const isIngestTeam = _activeCalendar === 'INGEST';

    // Parse Comment field for local shift time
    // Comment blank or '-' means no local time available
    // Coordination team: always use Start Date directly (already UTC)
    const hasComment = !isCoordTeam && !isIngestTeam && comment && comment.trim() !== '-' && comment.trim() !== '';
    if(hasComment){
      const parts = comment.split('-').map(s=>s.trim());
      if(parts.length===2){
        const pm = t => { const m=t.match(/(\d{1,2}):(\d{2})/); return m?parseInt(m[1])+parseInt(m[2])/60:null; };
        localStart = pm(parts[0]);
        localEnd   = pm(parts[1]);
      }
    }
    // For managers, check if they're ET-based by name
    const ET_MANAGER_NAMES = ['panepinto','restivo','torres','howard','gannello'];
    const empNamesLower = employees.map(n=>n.toLowerCase());
    const isETManager = ET_MANAGER_NAMES.some(m => empNamesLower.some(n=>n.includes(m)));
    const homeOffset = (() => {
      if(isCoordTeam || isIngestTeam) return 0; // These Start Dates are already stored as UTC
      if(isIndiaTeam) return 5.5;
      if(tf2.includes('AMS') || tf2.includes('WAW')) return 2;
      if(tf2.includes('Director')) return 2;
      if((tf2.includes('Manager') || tf2.includes('Supervisor')) && !isETManager) return 2;
      return -4; // ET default (NY, ET managers, RIV)
    })();

    if(sd){
      const d = new Date(sd);
      const sdUTC = d.getUTCHours() + d.getUTCMinutes()/60;
      if(!hasComment || isIndiaTeam){
        // No comment, or India team where Start Date is reliable — use Start Date UTC directly
        startET = sdUTC;
      } else {
        // Use Comment local time + home TZ offset
        startET = localStart !== null ? ((localStart - homeOffset) + 24) % 24 : sdUTC;
      }
      endET = startET + duration;
    } else if(localStart !== null){
      startET = ((localStart - homeOffset) + 24) % 24;
      endET = startET + duration;
    }

    employees.forEach(name => {
      // Skip bank holiday entries
      if(!name || name.toLowerCase().includes('bank holiday') || name.toLowerCase().includes('offices closed')) return;
      if(!peopleMap[name]) peopleMap[name] = [];
      peopleMap[name].push({shift, startET, endET, localStart, localEnd, duration, teamField, personName: name});
    });
  });

  // Group by team
  const teamGroups = {};
  TEAM_ORDER.forEach(t => teamGroups[t] = []);
  // Collect all teams from data dynamically
  const seenTeams = new Set();
  Object.values(peopleMap).forEach(shifts => {
    const tf = shifts[0] && shifts[0].teamField;
    if(tf) seenTeams.add(tf);
  });
  // Build ordered list: only rebuild for QC calendar, preserve config order for others
  if(_activeCalendar === 'QC') {
    TEAM_ORDER = [...KNOWN_TEAMS.filter(t=>seenTeams.has(t)), ...[...seenTeams].filter(t=>!KNOWN_TEAMS.includes(t))];
  }
  // For RIV/COORD, TEAM_ORDER is already set correctly by setActiveCalendar

  Object.keys(peopleMap).forEach(name => {
    const data = peopleMap[name][0]||null;
    const team = teamForName(name, data && data.teamField);
    if(!teamGroups[team]) teamGroups[team] = [];
    if(!teamGroups[team].find(p=>p.name===name)){
      teamGroups[team].push({name, data});
    }
  });
  // Sort each team group alphabetically for consistent day-to-day order
  Object.keys(teamGroups).forEach(t => {
    teamGroups[t].sort((a,b) => a.name.localeCompare(b.name));
  });

  // Hourly coverage count - use same TZ conversion as bars
  const hourCount = new Array(24).fill(0);
  const hourPeople = Array.from({length:24}, ()=>[]); // track who's working each hour
  let totalIn=0, totalOut=0;
  const tzOff = TZ_OFFSETS[tz] !== undefined ? TZ_OFFSETS[tz] : -4;

  Object.entries(peopleMap).forEach(([personName, shifts]) => {
    const d = shifts[0];
    if(!d) return;
    const status = shiftStatus(d.shift);
    if(status==='in' && d.startET!==null){
      totalIn++;
      const sUTC = d.startET; // already UTC from Airtable Start Date
      const s = ((sUTC + tzOff) + 24) % 24;
      const e = s + (d.duration || 0);
      for(let h=Math.floor(s); h<Math.ceil(e); h++){
        const hi = h % 24;
        hourCount[hi]++;
        hourPeople[hi].push(personName);
      }
    } else { totalOut++; }
  });

  const maxCount = Math.max(...hourCount, 1);

  function makeAxis(){
    let h = '<div class="axis">';
    AXIS_HOURS.forEach((hr,i) => { h+=`<div class="axis-tick" style="left:${pctAxis(hr)}">${AXIS_LABELS[i]}</div>`; });
    return h+'</div>';
  }

  function makeNowLine(tz){
    const left = `calc(150px + ${(now/24*100).toFixed(2)}% * ((100% - 150px) / 100))`;
    return `<div class="now-wrap" style="position:absolute;left:${left};top:0;bottom:0">
      <div class="now-tip">${fmt12(now)} ${tz}</div>
      <div class="now-line"></div>
    </div>`;
  }

  let html = `<div class="stats">
    <div class="stat"><div class="stat-n green">${totalIn}</div><div style="font-size:11px;color:#888;margin-top:1px">Working</div></div>
    <div class="stat"><div class="stat-n red">${totalOut}</div><div style="font-size:11px;color:#888;margin-top:1px">Off / PTO</div></div>
  </div>
  <div class="legend">
    <span class="li"><span class="lb" style="background:#d4edba;border:.5px solid #b5d99a"></span>Working</span>
    <span class="li"><span class="lb" style="background:#efefef;border:.5px solid #ddd"></span>Day off</span>
    <span class="li"><span class="lb" style="background:#fadadd"></span>PTO</span>
    <span class="li"><span class="lb" style="background:#fde8d8"></span>Sick leave</span>
    <span class="li"><span class="lb" style="background:#fdd5d5"></span>Summer Hours</span>
    <span class="li"><span class="lb" style="background:#f5c6cb"></span>Company Holiday</span>
    <span class="li"><span class="lb" style="background:#d6e8fa"></span>Special</span>
  </div>`;

  const teamFilterVal = document.getElementById('team-filter') ? document.getElementById('team-filter').value : 'ALL';

  // People who appear in multiple team filters (managers shown in their region view)
  const FILTER_EXTRAS = {
    '*QC NY':  ['panepinto','restivo'],
    '-QC AMS': ['hoogervorst','karels'],
    '-QC WAW': ['skutnik'],
    'Ingest NY': ['wortmann','spiers'],   // managers also shown in NY
    'Ingest LA': ['wortmann','spiers'],   // and LA
    'Ingest AMS': ['wortmann','spiers'],  // and AMS
    'RIV US': ['chopra','huber'],
    'RIV Canada': ['chopra','huber'],
    'RIV India': ['chopra','huber'],
    'RIV Netherlands': ['chopra','huber'],
    'RIV Poland': ['chopra','huber'],
    'RIV Cyprus': ['chopra','huber'],
    'Coordination Team': [],
    'Coordination Supervisor': []
  };

  // Build a filtered view of teamGroups
  function getFilteredGroups(filterVal) {
    if(filterVal === 'ALL') return teamGroups;
    const result = {};
    result[filterVal] = teamGroups[filterVal] || [];
    const extras = FILTER_EXTRAS[filterVal] || [];
    if(extras.length > 0) {
      const extraPeople = [];
      // Search all manager/supervisor groups for matching people
      const mgmtGroups = ['#QC Manager & Supervisor','QC Director','Ingest Manager',
        'RIV Team Manager','RIV Team Sr Director','Coordination Manager','Coordination Supervisor'];
      mgmtGroups.forEach(t => {
        (teamGroups[t]||[]).forEach(p => {
          if(extras.some(e => p.name.toLowerCase().includes(e)) && !result[filterVal].find(x=>x.name===p.name)) {
            extraPeople.push(p);
          }
        });
      });
      if(extraPeople.length > 0) {
        result[filterVal] = [...(result[filterVal]||[]), ...extraPeople];
      }
    }
    return result;
  }

  const filteredGroups = getFilteredGroups(teamFilterVal);
  const visibleTeams = teamFilterVal === 'ALL' ? TEAM_ORDER : [teamFilterVal];

  visibleTeams.forEach(team => {
    const members = filteredGroups[team];
    if(!members || members.length===0) return;

    let rows = '';
    members.forEach(({name, data}) => {
      const status = shiftStatus(data ? data.shift : '');
      const scls   = {in:'b-in',off:'b-off',pto:'b-pto',sick:'b-sick',hol:'b-hol',comp_hol:'b-comp-hol',special:'b-special'}[status]||'b-off';
      const slbl   = {off:'Day off',pto:'PTO',sick:'Sick leave',hol:'Summer Hours',comp_hol:'Company Holiday',special:'Special'}[status]||'';

      let barHtml = '<div class="track"></div>';
      if(status==='in' && data && data.startET!==null){
        // data.startET is UTC hours; convert to display timezone
        const tzOff = TZ_OFFSETS[tz] !== undefined ? TZ_OFFSETS[tz] : -4;
        // Use Start Date UTC directly for positioning - it's already stored as UTC in Airtable
        const sUTC = data.startET;
        const dur = data.duration || 0;
        const s = ((sUTC + tzOff) + 24) % 24;
        const e = s + dur;
        const makeBar=(bs,be)=>{
          const lbl = fmt12(bs)+'–'+fmt12(be >= 24 ? be-24 : be);
          const barW = Math.min(be,30)-bs;
          return `<div class="bar b-in" style="left:${pct(bs)};width:${pct(barW)}" title="${name} · ${lbl}">${lbl}</div>`;
        };
        // No splitting - let bar extend past midnight naturally up to 30h
        const clampedS = Math.min(s, 29);
        const clampedE = Math.min(e, 30);
        barHtml += makeBar(clampedS, clampedE);
      } else {
        barHtml += `<div class="bar ${scls}" style="left:0;width:100%">${slbl}</div>`;
      }

      const RIV_INGEST_NAMES = ['bijan sahoo','christos georgiou','joshua brooker'];
      const isIngestQC2 = _activeCalendar==='RIV' && RIV_INGEST_NAMES.some(n=>name.toLowerCase().includes(n.split(' ')[1]));
      rows += `<div class="person-row">
        <div class="pinfo"><div class="pname" title="${name}">${name}</div>${isIngestQC2?'<div style="font-size:9px;color:#aaa;margin-top:1px">Ingest/QC</div>':''}<div class="ptz">${TEAM_TZ[team]||''}</div></div>
        <div class="timeline">${barHtml}</div>
      </div>`;
    });

    html += `<div class="card">
      <div class="team-name">${TEAM_LABELS[team]}</div>
      ${makeAxis()}
      <div style="position:relative">
        ${isToday ? makeNowLine(tz) : ''}
        ${rows}
      </div>
    </div>`;
  });

  // Gap detection (not shown for Coordination team)
  const gapHours = _activeCalendar === 'COORD' ? [] : hourCount.map((c,h)=>c===0?h:null).filter(h=>h!==null);
  if(gapHours.length > 0){
    const gapRanges = [];
    let rangeStart = gapHours[0], prev = gapHours[0];
    for(let i=1;i<=gapHours.length;i++){
      if(i===gapHours.length || gapHours[i]!==prev+1){
        gapRanges.push(rangeStart===prev ? fmt12(rangeStart) : fmt12(rangeStart)+'–'+fmt12(prev+1));
        if(i<gapHours.length){ rangeStart=gapHours[i]; }
      }
      if(i<gapHours.length) prev=gapHours[i];
    }
    html = `<div style="background:#fff0f0;border:2px solid #e74c3c;border-radius:12px;padding:1rem 1.25rem;margin-bottom:1rem;display:flex;align-items:center;gap:12px">
      <div style="font-size:28px">⚠️</div>
      <div>
        <div style="font-weight:600;font-size:14px;color:#c0392b">Coverage gap${gapRanges.length>1?'s':''} detected</div>
        <div style="font-size:13px;color:#7a1a1a;margin-top:2px">No one is working at: <strong>${gapRanges.join(', ')} ${tz}</strong></div>
      </div>
    </div>` + html;
  }

  // Coverage shown in sticky bar at top

  document.getElementById('main').innerHTML = html;

  // Populate sticky heatmap
  const stickyCovBar = document.getElementById('sticky-cov-bar');
  const stickyGapFlag = document.getElementById('sticky-gap-flag');
  const stickyCov = document.getElementById('sticky-cov');
  if(stickyCovBar){
    stickyCovBar.innerHTML = '';
    hourCount.forEach((c,h)=>{
      const ratio = c/maxCount;
      const color = ratio===0 ? '#fdd5d5' : ratio<0.35 ? `rgba(184,101,10,${0.25+ratio})` : `rgba(61,122,26,${0.25+ratio*0.65})`;
      const seg = document.createElement('div');
      seg.style.cssText = `width:${(100/24).toFixed(3)}%;height:100%;background:${color};position:relative;flex-shrink:0;cursor:default`;
      const tip = document.getElementById('cov-tooltip');
      const people = hourPeople[h] || [];
      seg.addEventListener('mouseenter', e=>{
        tip.textContent = fmt12(h)+' '+tz+' — '+c+' '+(c===1?'person':'people')+' working'+(c===0?' ⚠️':'');
        tip.style.display='block';
      });
      seg.addEventListener('mousemove', e=>{ tip.style.left=(e.clientX-40)+'px'; tip.style.top=(e.clientY+16)+'px'; });
      seg.addEventListener('mouseleave', ()=>{ tip.style.display='none'; });
      seg.style.cursor = 'pointer';
      seg.addEventListener('click', e=>{
        e.stopPropagation();
        const popup = document.getElementById('hour-popup');
        const title = document.getElementById('hour-popup-title');
        const body  = document.getElementById('hour-popup-body');
        title.textContent = fmt12(h)+' '+tz;
        if(people.length===0){
          body.innerHTML = '<div style="color:#c0392b;font-size:13px">⚠️ No coverage at this hour</div>';
        } else {
          body.innerHTML = '<div style="font-size:12px;color:#888;margin-bottom:6px">'+people.length+' '+(people.length===1?'person':'people')+' working</div>'
            + people.map(p=>`<div style="display:flex;align-items:center;gap:8px;padding:4px 0;border-bottom:0.5px solid #f0f0f0">
              <div style="width:8px;height:8px;border-radius:50%;background:#3b7a1a;flex-shrink:0"></div>
              <div style="font-size:13px;color:#1a1a1a">${p}</div>
            </div>`).join('');
        }
        // Position popup below the bar
        const rect = seg.getBoundingClientRect();
        popup.style.left = Math.min(e.clientX-20, window.innerWidth-320)+'px';
        popup.style.top = (rect.bottom+8)+'px';
        popup.style.display='block';
      });
      if(h%3===0){
        const lbl = document.createElement('span');
        lbl.textContent = fmt12(h).replace(' AM','a').replace(' PM','p');
        lbl.style.cssText = 'position:absolute;bottom:-15px;left:50%;transform:translateX(-50%);font-size:9px;color:#aaa;white-space:nowrap;pointer-events:none';
        seg.appendChild(lbl);
      }
      stickyCovBar.appendChild(seg);
    });
    stickyGapFlag.style.display = hourCount.some(c=>c===0) ? 'block' : 'none';
    stickyCov.style.display = 'block';
  }

}

// ── All Calendars merged view ─────────────────────────────────────────────
let _allCalendarCache = {};

async function loadAllCalendars(ds){
  _rendering = ds;
  document.getElementById('stale').style.display = 'none';
  showSkeleton();

  try {
    let qcRecs, rivRecs, coordRecs;
    const cached = _allCalendarCache[ds];

    if(cached){
      qcRecs = cached.QC; rivRecs = cached.RIV; coordRecs = cached.COORD;
    } else {
      // Fetch QC
      const qcCache = {};
      _activeCalendar = 'QC'; _tableId = CALENDARS.QC.tableId;
      if(!_employeeMap) await loadEmployeeMap();
      let qcOff = null, qcRecs2 = [];
      do {
        let url = `https://api.airtable.com/v0/${CALENDARS.QC.baseId}/${CALENDARS.QC.tableId}?filterByFormula=IS_SAME({Start Date},"${ds}","day")&pageSize=100`;
        if(qcOff) url += '&offset='+qcOff;
        const r = await fetch(url, {headers:{Authorization:'Bearer '+CALENDARS.QC.token}});
        if(!r.ok) throw new Error('QC fetch failed');
        const d = await r.json();
        qcRecs2 = qcRecs2.concat(d.records||[]);
        qcOff = d.offset||null;
      } while(qcOff);
      // Also add RIV VP/weekend people
      const date = new Date(ds+'T12:00:00');
      const isWeekend = date.getDay()===0||date.getDay()===6;
      let rivExtra = [];
      try {
        const rr = await fetch(`https://api.airtable.com/v0/${CALENDARS.QC.baseId}/tblnDTIxNAC0usEWF?filterByFormula=IS_SAME({Start Date},"${ds}","day")&pageSize=100`,
          {headers:{Authorization:'Bearer '+CALENDARS.QC.token}});
        if(rr.ok){
          const rd = await rr.json();
          (rd.records||[]).forEach(rec=>{
            const name=(rec.fields['Employees']||'').toLowerCase();
            const isVP=RIV_VP.some(n=>name.includes(n.toLowerCase()));
            const isWH=RIV_WEEKEND.some(n=>n.split(' ').some(p=>p.length>3&&name.includes(p)));
            if(isVP||(isWH&&isWeekend)){
              rec.fields['Team (from Employees)']=isVP?'VP':'*QC NY';
              rivExtra.push(rec);
            }
          });
        }
      } catch(e){}
      qcRecs = [...qcRecs2, ...rivExtra];

      // Fetch RIV
      _activeCalendar = 'RIV'; _tableId = CALENDARS.RIV.tableId;
      let rivOff = null; rivRecs = [];
      do {
        let url = `https://api.airtable.com/v0/${CALENDARS.RIV.baseId}/${CALENDARS.RIV.tableId}?filterByFormula=IS_SAME({Start Date},"${ds}","day")&pageSize=100`;
        if(rivOff) url += '&offset='+rivOff;
        const r = await fetch(url, {headers:{Authorization:'Bearer '+CALENDARS.RIV.token}});
        if(!r.ok) break;
        const d = await r.json();
        rivRecs = rivRecs.concat(d.records||[]);
        rivOff = d.offset||null;
      } while(rivOff);
      // Filter bank holiday entries and add placeholders for missing members
      rivRecs = rivRecs.filter(r => {
        const n = (r.fields['Employees']||r.fields['Name (from Employees)']||'').toString().toLowerCase();
        return !n.includes('bank holiday') && !n.includes('offices closed');
      });
      // Add placeholders for RIV members with no record
      const rivSeen = new Set(rivRecs.map(r => {
        const nfe = r.fields['Name (from Employees)'];
        return ((Array.isArray(nfe)?nfe[0]:nfe)||r.fields['Employees']||'').toLowerCase().replace(/[^a-z ]/g,'');
      }));
      Object.keys(CALENDARS.RIV.memberTeams).forEach(mn => {
        const mNorm = mn.toLowerCase().replace(/[^a-z ]/g,'');
        if(!rivSeen.has(mNorm)) {
          rivRecs.push({id:'ph_'+mn, fields:{
            'Employees':mn,'Name (from Employees)':[mn],
            'Team (from Employees)':[CALENDARS.RIV.memberTeams[mn]],
            'Shift':'Off','Start Date':null,'Shift duration':0
          }});
        }
      });

      // Fetch COORD
      _activeCalendar = 'COORD';
      coordRecs = await fetchCoordDay(ds);

      // Fetch INGEST (use fetchIngestDay which applies name filtering)
      _activeCalendar = 'INGEST'; _tableId = CALENDARS.INGEST.tableId;
      const ingestRecs = await fetchIngestDay(ds);

      _allCalendarCache[ds] = {QC: qcRecs, RIV: rivRecs, COORD: coordRecs, INGEST: ingestRecs};
    }

    // Render each calendar section separately with its own team logic
    const tz = activeTz();
    const now = nowInTz(tz);
    const isToday = ds === dateStr(new Date());
    const tzOff = TZ_OFFSETS[tz]||0;

    // Build sections HTML
    let html = '';
    let totalIn = 0, totalOut = 0;
    const hourCount = new Array(24).fill(0);
    const hourPeople = Array.from({length:24},()=>[]);
    const maxCount = 1; // will recalc

    // Helper: render one calendar section
    function renderSection(records, calKey, sectionTitle){
      const cal = CALENDARS[calKey];
      _activeCalendar = calKey;
      TEAM_ORDER.length = 0;
      cal.teamOrder.forEach(t=>TEAM_ORDER.push(t));
      Object.keys(TEAM_LABELS).forEach(k=>delete TEAM_LABELS[k]);
      Object.assign(TEAM_LABELS, cal.teamLabels);

      // Build peopleMap
      const peopleMap = {};
      records.forEach(rec=>{
        const f = rec.fields;
        let names = [];
        if(f['Name (from Employees)']) names = Array.isArray(f['Name (from Employees)'])?f['Name (from Employees)']:[f['Name (from Employees)']];
        else names = resolveEmployees(f['Employees']);
        const teamField = Array.isArray(f['Team (from Employees)'])?f['Team (from Employees)'][0]:(f['Team (from Employees)']||'');
        const shift = f['Shift']||'';
        const comment = f['Comment']||f['Comments']||'';
        const duration = parseFloat(f['Shift duration'])||0;
        const sd = f['Start Date']||'';
        let startUTC = null;
        if(sd){ const d=new Date(sd); startUTC=d.getUTCHours()+d.getUTCMinutes()/60; }
        const isCoord = calKey==='COORD';
        const tf2 = String(teamField);
        const isIndia = tf2.includes('QC IN');
        const hasComment = !isCoord && comment && comment.trim()!=='-' && comment.trim()!=='';
        let localStart=null;
        if(hasComment){ const pts=comment.split('-').map(s=>s.trim()); if(pts.length===2){ const pm=t=>{const m=t.match(/(\d{1,2}):(\d{2})/);return m?parseInt(m[1])+parseInt(m[2])/60:null;}; localStart=pm(pts[0]); } }
        const homeOff=(()=>{
          if(isCoord) return 0;
          if(isIndia) return 5.5;
          if(calKey==='RIV'){ const rt=CALENDARS.RIV.memberTeams; const nm=names[0]||''; return rt[nm]&&rt[nm].includes('India')?5.5:rt[nm]&&(rt[nm].includes('Netherlands')||rt[nm].includes('Poland'))?2:rt[nm]&&rt[nm].includes('Cyprus')?3:-4; }
          if(tf2.includes('AMS')||tf2.includes('WAW')) return 2;
          if(tf2.includes('Director')) return 2;
          const ET_MGR=['panepinto','restivo'];
          const nl=(names[0]||'').toLowerCase();
          if((tf2.includes('Manager')||tf2.includes('Supervisor'))&&!ET_MGR.some(m=>nl.includes(m))) return 2;
          return -4;
        })();
        let startET = null, dur = duration;
        if(startUTC!==null){
          if(!hasComment||isIndia||isCoord) startET=startUTC;
          else startET=localStart!==null?((localStart-homeOff)+24)%24:startUTC;
        }
        names.forEach(name=>{
          if(!peopleMap[name]) peopleMap[name]=[];
          peopleMap[name].push({shift,startET,duration:dur,teamField,personName:name});
        });
      });

      // Group by team
      const teamGroups={};
      TEAM_ORDER.forEach(t=>teamGroups[t]=[]);
      Object.keys(peopleMap).forEach(name=>{
        const data=peopleMap[name][0]||null;
        const team=teamForName(name,data&&data.teamField);
        if(!teamGroups[team]) teamGroups[team]=[];
        if(!teamGroups[team].find(p=>p.name===name)) teamGroups[team].push({name,data});
      });

      // Build section HTML
      let shtml = `<div style="margin:8px 0 4px;font-size:11px;font-weight:700;color:#555;letter-spacing:.08em;text-transform:uppercase;padding:8px 0 0">${sectionTitle}</div>`;

      TEAM_ORDER.forEach(team=>{
        const members=teamGroups[team];
        if(!members||!members.length) return;
        let rows='';
        members.forEach(({name,data})=>{
          const status=shiftStatus(data?data.shift:'');
          const scls={in:'b-in',off:'b-off',pto:'b-pto',sick:'b-sick',hol:'b-hol',comp_hol:'b-comp-hol',special:'b-special'}[status]||'b-off';
          const slbl={off:'Day off',pto:'PTO',sick:'Sick leave',hol:'Summer Hours',comp_hol:'Company Holiday',special:'Special'}[status]||'';
          let barHtml='<div class="track"></div>';
          if(status==='in'&&data&&data.startET!==null){
            const s=((data.startET+tzOff)+24)%24;
            const e=s+(data.duration||0);
            const lbl=fmt12(s)+'–'+fmt12(e>=24?e-24:e);
            const barW=Math.min(e,30)-s;
            barHtml+=`<div class="bar b-in" style="left:${pct(s)};width:${pct(barW)}">${lbl}</div>`;
            // Count coverage
            totalIn++;
            for(let h=Math.floor(s);h<Math.ceil(e);h++){ hourCount[h%24]++; hourPeople[h%24].push(name); }
          } else {
            barHtml+=`<div class="bar ${scls}" style="left:0;width:100%">${slbl}</div>`;
            totalOut++;
          }
          const RIV_INGEST = ['bijan sahoo','christos georgiou','joshua brooker'];
          const isIngestQC = _activeCalendar==='RIV'&&RIV_INGEST.some(n=>name.toLowerCase().includes(n.split(' ')[1]));
          rows+=`<div class="person-row">
            <div class="pinfo"><div class="pname" title="${name}">${name}</div>${isIngestQC?'<div style="font-size:9px;color:#aaa;margin-top:1px">Ingest/QC</div>':''}<div class="ptz">${TEAM_TZ[team]||''}</div></div>
            <div class="timeline">${barHtml}</div>
          </div>`;
        });
        if(rows) shtml+=`<div class="card"><div class="team-name">${TEAM_LABELS[team]||team}</div>
          <div class="axis">${[0,3,6,9,12,15,18,21,24].map((h,i)=>`<div class="axis-tick" style="left:${pctAxis(h)}">${['12 AM','3 AM','6 AM','9 AM','12 PM','3 PM','6 PM','9 PM','12 AM'][i]}</div>`).join('')}</div>
          <div style="position:relative">${isToday?`<div class="now-wrap" style="position:absolute;left:calc(150px + ${(now/24*100).toFixed(2)}% * ((100% - 150px) / 100));top:0;bottom:0"><div class="now-tip">${fmt12(now)} ${tz}</div><div class="now-line"></div></div>`:''} ${rows}</div></div>`;
      });
      return shtml;
    }

    // Declare ingestRecs2 first, then propagate across all
    const ingestRecs2 = (_allCalendarCache[ds]||{}).INGEST||[];
    // Run propagation on combined records to detect AND apply holidays
    const allForProp = [...qcRecs, ...rivRecs, ...ingestRecs2, ...coordRecs];
    propagateHolidays(allForProp, ds);
    // Run again to ensure holidays detected from one team apply to all
    propagateHolidays(allForProp, ds);

    html += renderSection(qcRecs, 'QC', '── QC Team ──────────────────');
    _activeCalendar = 'RIV';
    html += renderSection(rivRecs, 'RIV', '── RIV Team ─────────────────');
    _activeCalendar = 'INGEST';
    html += renderSection(ingestRecs2, 'INGEST', '── Ingest Team ──────────────');
    _activeCalendar = 'COORD';
    html += renderSection(coordRecs, 'COORD', '── Coordination Team ────────');

    // Stats
    const maxC = Math.max(...hourCount,1);
    const statsHtml = `<div class="stats">
      <div class="stat"><div class="stat-n green">${totalIn}</div><div style="font-size:11px;color:#888">Working</div></div>
      <div class="stat"><div class="stat-n red">${totalOut}</div><div style="font-size:11px;color:#888">Off / PTO</div></div>
    </div>
    <div class="legend">
      <span class="li"><span class="lb" style="background:#d4edba;border:.5px solid #b5d99a"></span>Working</span>
      <span class="li"><span class="lb" style="background:#efefef;border:.5px solid #ddd"></span>Day off</span>
      <span class="li"><span class="lb" style="background:#fadadd"></span>PTO</span>
      <span class="li"><span class="lb" style="background:#fde8d8"></span>Sick leave</span>
      <span class="li"><span class="lb" style="background:#fdd5d5"></span>Summer Hours</span>
    <span class="li"><span class="lb" style="background:#f5c6cb"></span>Company Holiday</span>
    </div>`;

    // Reset to QC as default
    _activeCalendar = 'QC';
    setActiveCalendar('QC');

    document.getElementById('main').innerHTML = statsHtml + html;
    document.getElementById('lastupdated').textContent = 'Updated '+new Date().toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'});

    // Populate sticky heatmap
    const stickyCovBar=document.getElementById('sticky-cov-bar');
    const stickyGapFlag=document.getElementById('sticky-gap-flag');
    const stickyCov=document.getElementById('sticky-cov');
    if(stickyCovBar){
      stickyCovBar.innerHTML='';
      hourCount.forEach((c,h)=>{
        const ratio=c/maxC;
        const color=ratio===0?'#fdd5d5':ratio<0.35?`rgba(184,101,10,${0.25+ratio})`:`rgba(61,122,26,${0.25+ratio*0.65})`;
        const seg=document.createElement('div');
        seg.style.cssText=`width:${(100/24).toFixed(3)}%;height:100%;background:${color};position:relative;flex-shrink:0;cursor:pointer`;
        const tip=document.getElementById('cov-tooltip');
        const people=hourPeople[h]||[];
        seg.addEventListener('mouseenter',e=>{tip.textContent=fmt12(h)+' '+tz+' — '+c+' '+(c===1?'person':'people')+' working'+(c===0?' ⚠️':'');tip.style.display='block';});
        seg.addEventListener('mousemove',e=>{tip.style.left=(e.clientX-40)+'px';tip.style.top=(e.clientY+16)+'px';});
        seg.addEventListener('mouseleave',()=>{tip.style.display='none';});
        seg.addEventListener('click',e=>{
          e.stopPropagation();
          const popup=document.getElementById('hour-popup');
          const title=document.getElementById('hour-popup-title');
          const body=document.getElementById('hour-popup-body');
          title.textContent=fmt12(h)+' '+tz;
          body.innerHTML=people.length===0?'<div style="color:#c0392b">⚠️ No coverage</div>':'<div style="font-size:12px;color:#888;margin-bottom:6px">'+people.length+' working</div>'+people.map(p=>`<div style="padding:4px 0;border-bottom:.5px solid #f0f0f0;font-size:13px">${p}</div>`).join('');
          const rect=seg.getBoundingClientRect();
          popup.style.left=Math.min(e.clientX-20,window.innerWidth-320)+'px';
          popup.style.top=(rect.bottom+8)+'px';
          popup.style.display='block';
        });
        if(h%3===0){const lbl=document.createElement('span');lbl.textContent=fmt12(h).replace(' AM','a').replace(' PM','p');lbl.style.cssText='position:absolute;bottom:-15px;left:50%;transform:translateX(-50%);font-size:9px;color:#aaa;white-space:nowrap;pointer-events:none';seg.appendChild(lbl);}
        stickyCovBar.appendChild(seg);
      });
      stickyGapFlag.style.display=hourCount.some(c=>c===0)?'block':'none';
      stickyCov.style.display='block';
    }

  } catch(err){
    document.getElementById('main').innerHTML=`<div class="error"><strong>Could not load:</strong> ${err.message}</div>`;
    console.error(err);
  }
}


// ── Load flow ────────────────────────────────────────────────────────────────
async function loadDate(ds, fromRefresh){
  _rendering = ds;

  // Show cached data immediately if available
  const cached = !fromRefresh && ((_cache[ds]) || lsLoad(ds));
  if(cached){
    if(!_cache[ds]) _cache[ds] = cached;
    propagateHolidays(_cache[ds], ds);
    render(_cache[ds], ds);
    document.getElementById('stale').style.display = 'block';
    // refresh in background
    fetchDay(ds, true).then(()=>{
      if(_rendering===ds){
        document.getElementById('stale').style.display = 'none';
        propagateHolidays(_cache[ds]||[], ds);
        applyGlobalHolidaysToAllCaches(ds);
        render(_cache[ds], ds);
        document.getElementById('lastupdated').textContent = 'Updated '+new Date().toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'});
      }
    }).catch(()=>{});
  } else {
    // Show skeleton while fetching
    showSkeleton();
    try {
      await fetchDay(ds, fromRefresh);
      if(_rendering===ds){
        document.getElementById('stale').style.display = 'none';
        propagateHolidays(_cache[ds]||[], ds);
        // After detecting holidays, apply to all other calendar caches for this date
        applyGlobalHolidaysToAllCaches(ds);
        render(_cache[ds]||[], ds);
        document.getElementById('lastupdated').textContent = 'Updated '+new Date().toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'});
      }
    } catch(err) {
      document.getElementById('main').innerHTML = `<div class="error"><strong>Could not load data:</strong> ${err.message}</div>`;
    }
  }

  // Background prefetch adjacent days
  setTimeout(()=>{
    [-3,-2,-1,1,2,3,4,5].forEach(n=>{
      const adj = addDays(new Date(ds+'T12:00:00'),n);
      const ads = dateStr(adj);
      if(!_cache[ads]){
        const lsc = lsLoad(ads);
        if(lsc) _cache[ads]=lsc;
        else fetchDay(ads).catch(()=>{});
      }
    });
  }, 500);
}

function hardRefresh(){
  const ds = document.getElementById('date-picker').value || dateStr(new Date());
  const calKey = document.getElementById('calendar-select').value;
  if(calKey === 'ALL'){
    // Clear all calendar caches
    _allCalendarCache = {};
    loadAllCalendars(ds);
  } else {
    _cache[ds] = null;
    loadDate(ds, true);
  }
}

// ── Week View ─────────────────────────────────────────────────────────────
let _weekMode = false;

function toggleWeekView(){
  _weekMode = !_weekMode;
  const btn = document.getElementById('week-btn');
  btn.textContent = _weekMode ? '📅 Day view' : '📅 Week view';
  btn.style.background = _weekMode ? '#1a1a1a' : '#555';
  const picker = document.getElementById('date-picker');
  const ds = picker.value || dateStr(new Date());
  if(_weekMode) renderWeek(ds);
  else if(_cache[ds]) render(_cache[ds], ds);
  else loadDate(ds);
}

function getWeekDays(ds){
  const d = new Date(ds+'T12:00:00');
  const day = d.getDay();
  const monday = new Date(d);
  monday.setDate(d.getDate() - (day===0?6:day-1));
  return Array.from({length:7},(_,i)=>{ const x=new Date(monday); x.setDate(monday.getDate()+i); return dateStr(x); });
}

async function renderCoordWeek(days, todayDs) {
  const cal = CALENDARS.COORD;
  const dayNames = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const statusMap = { 'off': 'wk-off', 'in': 'wk-in', 'pto': 'wk-pto' };
  const labelMap  = { 'off': 'Off', 'in': 'In', 'pto': 'PTO' };

  // Fetch weekly schedule
  const r = await fetch(`https://api.airtable.com/v0/${cal.baseId}/${cal.tableId}?pageSize=100`,
    {headers:{Authorization:'Bearer '+cal.token}});
  if(!r.ok){ document.getElementById('main').innerHTML='<div class="error">Could not load Coordination schedule</div>'; return; }
  const data = await r.json();

  // Fetch PTO records with pagination
  const ptoDates = {};
  const PTO_NICKNAMES = {'nicco':'niccolò','nico':'niccolò','tess':'tessa','halley':'halley','sam':'samantha'};
  try {
    let wOff = null;
    do {
      let wUrl = `https://api.airtable.com/v0/${cal.baseId}/${cal.ptoTableId}?pageSize=100`;
      if(wOff) wUrl += '&offset='+wOff;
      const pr = await fetch(wUrl, {headers:{Authorization:'Bearer '+cal.token}});
      if(!pr.ok) break;
      const pd = await pr.json();
      (pd.records||[]).forEach(rec => {
        const f = rec.fields;
        const raw = (f['Person on PTO']||'').toLowerCase().trim();
        if(!raw) return;
        const ptoFirst = PTO_NICKNAMES[raw]||raw;
        const start = f['Start Date']||'';
        const end = f['End Date']||start;
        if(start){ if(!ptoDates[ptoFirst]) ptoDates[ptoFirst]=[]; ptoDates[ptoFirst].push({start,end,type:f['PTO Type']||'PTO'}); }
      });
      wOff = pd.offset||null;
    } while(wOff);
  } catch(e){}

  const dayNamesShort = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
  // Set correct team order for the active calendar
  const weekCalKey = document.getElementById('calendar-select').value;
  const weekEffCal = weekCalKey === 'ALL' ? 'QC' : weekCalKey;
  if(CALENDARS[weekEffCal]) {
    TEAM_ORDER.length = 0;
    CALENDARS[weekEffCal].teamOrder.forEach(t=>TEAM_ORDER.push(t));
    Object.keys(TEAM_LABELS).forEach(k=>delete TEAM_LABELS[k]);
    Object.assign(TEAM_LABELS, CALENDARS[weekEffCal].teamLabels);
    _activeCalendar = weekEffCal;
  }

  let html = '<div class="week-grid"><table class="week-table"><thead><tr><th class="name-col">Person</th>';
  days.forEach((d,i) => {
    const isToday = d === todayDs;
    const label = dayNamesShort[i]+'<br><span style="font-weight:400;color:#bbb">'+d.slice(5).replace('-','/')+'</span>';
    html += `<th class="${isToday?'today-col':''}" style="${isToday?'color:#2d6010':''}">${label}</th>`;
  });
  html += '</tr></thead><tbody>';

  TEAM_ORDER.forEach(team => {
    const members = data.records.filter(rec => {
      const name = rec.fields['Name']||'';
      return cal.members[name] && cal.members[name].team === team;
    });
    if(!members.length) return;
    html += `<tr><td class="team-header" colspan="${days.length+1}">${TEAM_LABELS[team]||team}</td></tr>`;
    members.forEach(rec => {
      const name = rec.fields['Name']||'';
      html += `<tr><td class="name-cell">${name}</td>`;
      days.forEach(d => {
        const date = new Date(d+'T12:00:00');
        const dayName = dayNames[date.getDay()];
        const isToday = d === todayDs;
        const val = rec.fields[dayName]||'Off';
        const isOff = !val || val.toLowerCase() === 'off';
        // Check PTO
        const nameLower2 = name.toLowerCase();
        const isPTO = [...(Object.keys(ptoDates)||[])].some(pn => {
          if(nameLower2.includes(pn.toLowerCase())||pn.toLowerCase().includes(nameLower2.split(' ')[0])) {
            return (ptoDates[pn]||[]).some(p=>p.start<=d&&d<=p.end);
          }
          return false;
        });
        const status = isPTO ? 'pto' : (isOff ? 'off' : 'in');
        const cls = statusMap[status]||'wk-off';
        const lbl = labelMap[status]||'Off';
        html += `<td class="${isToday?'today-col':''}"><span class="${cls}">${lbl}</span></td>`;
      });
      html += '</tr>';
    });
  });

  html += '</tbody></table></div>';
  document.getElementById('main').innerHTML = html;
}

async function renderWeek(ds){
  const days = getWeekDays(ds);
  const todayDs = dateStr(new Date());
  document.getElementById('main').innerHTML = '<div class="loading">Loading week...</div>';

  // COORD special case: use dedicated week renderer
  if(_activeCalendar === 'COORD') {
    await renderCoordWeek(days, todayDs);
    return;
  }

  // For each day, fetch using the correct calendar
  const calKey = document.getElementById('calendar-select').value;
  const effectiveCal = calKey === 'ALL' ? 'QC' : calKey;

  await Promise.all(days.map(async d => {
    if(_cache[d]) return;
    const origCal = _activeCalendar;
    const origTable = _tableId;
    _activeCalendar = effectiveCal;
    _tableId = CALENDARS[effectiveCal].tableId;
    try { await fetchDay(d, false); } catch(e){}
    _activeCalendar = origCal;
    _tableId = origTable;
  }));

  const tz = activeTz();
  const tzOff = TZ_OFFSETS[tz]||0;
  const teamFilterVal = document.getElementById('team-filter')?.value||'ALL';

  // Build people -> day -> shiftData map
  const peopleByTeam = {};
  const allPeopleMap = {};

  days.forEach(d => {
    const recs = _cache[d]||[];
    recs.forEach(rec => {
      const f = rec.fields;
      // Handle both QC (Employees field) and COORD/RIV (Name from Employees field)
      let name = '';
      if(f['Name (from Employees)']) {
        name = Array.isArray(f['Name (from Employees)']) ? f['Name (from Employees)'][0] : f['Name (from Employees)'];
      } else if(typeof f['Employees']==='string') {
        name = f['Employees'];
      } else if(Array.isArray(f['Employees']) && _employeeMap) {
        name = resolveEmployees(f['Employees'])[0]||'';
      }
      if(!name||name.startsWith('rec')) return;
      // Filter out bank holiday entries
      if(name.toLowerCase().includes('bank holiday') || name.toLowerCase().includes('holiday ca') ||
         name.toLowerCase().includes('holiday us') || name.toLowerCase().includes('holiday nl') ||
         name.toLowerCase().includes('holiday pol') || name.toLowerCase().includes('offices closed')) return;
      // Filter Ingest team to allowed people only
      if(_activeCalendar === 'INGEST') {
        const allowed = CALENDARS.INGEST.allowedNames;
        if(!allowed.some(n => name.toLowerCase().includes(n))) return;
      }
      const rawTeam = Array.isArray(f['Team (from Employees)'])?f['Team (from Employees)'][0]:(f['Team (from Employees)']||'');
      const team = teamForName(name, rawTeam);
      const shift = f['Shift']||'';
      const status = shiftStatus(shift);
      if(!allPeopleMap[name]) allPeopleMap[name]={team, days:{}};
      allPeopleMap[name].days[d] = status;
    });
  });

  // Group by team
  Object.entries(allPeopleMap).forEach(([name,{team}])=>{
    if(!peopleByTeam[team]) peopleByTeam[team]=[];
    if(!peopleByTeam[team].includes(name)) peopleByTeam[team].push(name);
  });

  const EXTRAS = {'*QC NY':['panepinto','restivo'],'-QC AMS':['hoogervorst','karels'],'-QC WAW':['skutnik']};
  const dayNames = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];

  // Set correct team order for the active calendar
  const weekCalKey = document.getElementById('calendar-select').value;
  const weekEffCal = weekCalKey === 'ALL' ? 'QC' : weekCalKey;
  if(CALENDARS[weekEffCal]) {
    TEAM_ORDER.length = 0;
    CALENDARS[weekEffCal].teamOrder.forEach(t=>TEAM_ORDER.push(t));
    Object.keys(TEAM_LABELS).forEach(k=>delete TEAM_LABELS[k]);
    Object.assign(TEAM_LABELS, CALENDARS[weekEffCal].teamLabels);
    _activeCalendar = weekEffCal;
  }

  let html = '<div class="week-grid"><table class="week-table"><thead><tr><th class="name-col">Person</th>';
  days.forEach((d,i)=>{
    const isToday = d===todayDs;
    const label = dayNames[i]+'<br><span style="font-weight:400;color:#bbb">'+d.slice(5).replace('-','/')+'</span>';
    html += `<th class="${isToday?'today-col':''}" style="${isToday?'color:#2d6010':''}">${label}</th>`;
  });
  html += '</tr></thead><tbody>';

  const visTeams = teamFilterVal==='ALL' ? TEAM_ORDER : [teamFilterVal];
  visTeams.forEach(team => {
    let members = [...(peopleByTeam[team]||[])];
    if(teamFilterVal!=='ALL'||(EXTRAS[team])){
      const extras = EXTRAS[team]||[];
      if(extras.length){
        Object.keys(allPeopleMap).forEach(name=>{
          const t = allPeopleMap[name].team;
          if((t.includes('Manager')||t==='QC Director') && extras.some(e=>name.toLowerCase().includes(e)) && !members.includes(name)) members.push(name);
        });
      }
    }
    if(!members.length) return;
    html += `<tr><td class="team-header" colspan="${days.length+1}">${TEAM_LABELS[team]||team}</td></tr>`;
    members.forEach(name=>{
      const pd = allPeopleMap[name]||{days:{}};
      html += `<tr><td class="name-cell">${name}</td>`;
      days.forEach(d=>{
        const st = pd.days[d]||'none';
        const isToday = d===todayDs;
        const cls = {in:'wk-in',off:'wk-off',pto:'wk-pto',sick:'wk-sick',hol:'wk-hol',comp_hol:'wk-comp-hol',none:'wk-none'}[st]||'wk-off';
        const lbl = {in:'In',off:'Off',pto:'PTO',sick:'Sick',hol:'Summer Hrs',comp_hol:'Holiday',none:'—'}[st]||st;
        html += `<td class="${isToday?'today-col':''}"><span class="${cls}">${lbl}</span></td>`;
      });
      html += '</tr>';
    });
  });

  html += '</tbody></table></div>';
  document.getElementById('main').innerHTML = html;
}

// ── Init ──────────────────────────────────────────────────────────────────────
document.addEventListener('click', e=>{
  const popup = document.getElementById('hour-popup');
  if(popup && !popup.contains(e.target)) popup.style.display='none';
});

document.addEventListener('DOMContentLoaded', ()=>{
  // Clear any stale cached records that had holidays baked in from previous sessions
  // This forces holiday re-detection from fresh Airtable data each session
  try {
    Object.keys(localStorage).forEach(k => {
      if(k.startsWith('qc3_')) {
        const raw = localStorage.getItem(k);
        if(raw) {
          const obj = JSON.parse(raw);
          if(obj.records) {
            let changed = false;
            obj.records = obj.records.map(r => {
              if(r && r.fields && r.fields['Shift'] === 'US Holiday') {
                changed = true;
                const orig = r.id && r.id.startsWith('placeholder_') ? 'Off' : 'Off';
                return {...r, fields: {...r.fields, 'Shift': orig}};
              }
              return r;
            });
            if(changed) localStorage.setItem(k, JSON.stringify(obj));
          }
        }
      }
    });
  } catch(e) {}

  // Set date picker to today
  const picker = document.getElementById('date-picker');
  const now = new Date();
  const todayStr = dateStr(now);
  picker.value = todayStr;
  // Force trigger if value didn't stick (some browsers/hosts)
  if(!picker.value) {
    picker.setAttribute('value', todayStr);
  }

  // Load saved TZ preference
  const savedTz = localStorage.getItem('qc_tz');
  if(savedTz) document.getElementById('tz-select').value = savedTz;

  // Update date line
  function updateDateLine(){
    const ds = picker.value || todayStr;
    const d  = new Date(ds+'T12:00:00');
    const opts = {weekday:'long',year:'numeric',month:'long',day:'numeric'};
    document.getElementById('dateline').textContent =
      d.toLocaleDateString('en-US',opts) + '  ·  ' + activeTz() + ' axis';
  }
  // Small delay to let browser settle before reading picker value
  setTimeout(updateDateLine, 10);

  // Wire up controls
  picker.addEventListener('change', ()=>{
    updateDateLine();
    const calKey = document.getElementById('calendar-select').value;
    if(calKey === 'ALL') loadAllCalendars(picker.value);
    else loadDate(picker.value);
  });
  document.getElementById('tz-select').addEventListener('change', ()=>{
    updateDateLine();
    const ds = picker.value || todayStr;
    // Always re-render with current data when TZ changes
    if(_cache[ds] && _cache[ds].length > 0) {
      render(_cache[ds], ds);
    } else {
      loadDate(ds);
    }
  });

  document.getElementById('team-filter').addEventListener('change', ()=>{
    const ds = picker.value || todayStr;
    if(_cache[ds]) render(_cache[ds], ds);
  });

  window.saveDefault = function(){
    localStorage.setItem('qc_tz', activeTz());
    const tf = document.getElementById('team-filter');
    if(tf) localStorage.setItem('qc_team', tf.value);
    const cs = document.getElementById('calendar-select');
    if(cs) localStorage.setItem('qc_calendar', cs.value);
    const btn = document.getElementById('default-btn');
    btn.textContent = '✓ Saved!';
    setTimeout(()=>{ btn.textContent = '★ Set default'; }, 1500);
  };

  // Restore saved calendar and team filter
  const savedCalendar = localStorage.getItem('qc_calendar');
  if(savedCalendar){
    const cs = document.getElementById('calendar-select');
    if(cs) cs.value = savedCalendar;
  }

  // Initialize calendar state without triggering a load yet
  const initialCal = document.getElementById('calendar-select').value;
  const initialCalKey = initialCal === 'ALL' ? 'QC' : initialCal;
  setActiveCalendar(initialCalKey);

  // Update sub-team dropdown
  const subteams = CALENDAR_SUBTEAMS[initialCalKey] || [];
  const tf2 = document.getElementById('team-filter');
  if(subteams.length > 0){
    tf2.innerHTML = '<option value="ALL">All</option>';
    subteams.forEach(s => {
      const opt = document.createElement('option');
      opt.value = s.value; opt.textContent = s.label;
      tf2.appendChild(opt);
    });
    tf2.style.display = '';
  }
  const savedTeam = localStorage.getItem('qc_team');
  if(savedTeam && tf2) tf2.value = savedTeam;

  // Update TZ dropdown
  updateTzDropdown(initialCalKey);

  // Initial load — always pass todayStr explicitly
  setTimeout(()=>{
    const calKey = document.getElementById('calendar-select').value;
    if(calKey === 'ALL') loadAllCalendars(todayStr);
    else loadDate(todayStr);
  }, 50);

  // Auto-refresh every 20 minutes
  setInterval(()=>{
    const ds = document.getElementById('date-picker').value || todayStr;
    // Only auto-refresh if viewing today
    if(ds !== todayStr) return;
    const calKey = document.getElementById('calendar-select').value;
    if(calKey === 'ALL'){
      _allCalendarCache[ds] = null;
      loadAllCalendars(ds).catch(()=>{});
    } else {
      const cacheKey = _activeCalendar + '_' + ds;
      _cache[cacheKey] = null;
      _cache[ds] = null;
      fetchDay(ds, true).then(()=>{
        propagateHolidays(_cache[ds]||[], ds);
        render(_cache[ds]||[], ds);
        document.getElementById('lastupdated').textContent = 'Auto-updated ' + new Date().toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'});
      }).catch(()=>{});
    }
  }, 20 * 60 * 1000);
});
</script>
